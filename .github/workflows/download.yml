name: Download SeamlessM4T

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install git-lfs
        run: |
          sudo apt update
          sudo apt install git-lfs -y
          git lfs install

      - name: Clone model with HF token
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://$HF_TOKEN@huggingface.co/facebook/seamless-m4t-v2-large
          cd seamless-m4t-v2-large
          git lfs pull

      - name: Zip model
        run: |
          sudo apt install zip -y
          zip -r seamless-m4t-v2-large.zip seamless-m4t-v2-large

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seamless-m4t-v2-large
          path: seamless-m4t-v2-large.zip
