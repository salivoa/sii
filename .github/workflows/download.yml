name: Download SeamlessM4T

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install git-lfs -y
          pip install huggingface_hub

      - name: Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli login --token "$HF_TOKEN"

      - name: Download model via HF CLI
        run: |
          huggingface-cli download facebook/seamless-m4t-v2-large \
            --local-dir seamless-m4t-v2-large \
            --local-dir-use-symlinks False

      - name: Zip model
        run: |
          sudo apt install zip -y
          zip -r seamless-m4t-v2-large.zip seamless-m4t-v2-large

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seamless-m4t-v2-large
          path: seamless-m4t-v2-large.zip
